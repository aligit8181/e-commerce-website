<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy - Your Online Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav-brand">
                <h1><i class="fas fa-shopping-bag"></i> ShopEasy</h1>
            </div>
            <nav class="nav-menu">
                <a href="#" onclick="showSection('home')" class="nav-link active">Home</a>
                <a href="#" onclick="showSection('products')" class="nav-link">Products</a>
                <div class="nav-user">
                    <div id="authButtons" class="auth-buttons">
                        <button onclick="showSection('login')" class="btn btn-outline">Login</button>
                        <button onclick="showSection('register')" class="btn btn-primary">Sign Up</button>
                    </div>
                    <div id="userMenu" class="user-menu" style="display: none;">
                        <span id="userName" class="user-name"></span>
                        <button onclick="showSection('cart')" class="btn btn-icon">
                            <i class="fas fa-shopping-cart"></i>
                            <span id="cartCount" class="cart-count">0</span>
                        </button>
                        <button onclick="showSection('orders')" class="btn btn-outline">Orders</button>
                        <button onclick="logout()" class="btn btn-outline">Logout</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Home Section -->
        <section id="home" class="section active">
            <div class="hero">
                <div class="container">
                    <div class="hero-content">
                        <h2>Welcome to ShopEasy</h2>
                        <p>Discover amazing products at unbeatable prices</p>
                        <button onclick="showSection('products')" class="btn btn-primary btn-large">Shop Now</button>
                    </div>
                </div>
            </div>
            
            <div class="container">
                <div class="featured-section">
                    <h3>Featured Products</h3>
                    <div id="featuredProducts" class="product-grid"></div>
                </div>
            </div>
        </section>

        <!-- Products Section -->
        <section id="products" class="section">
            <div class="container">
                <div class="products-header">
                    <h2>Our Products</h2>
                    <div class="filters">
                        <select id="categoryFilter" onchange="filterProducts()">
                            <option value="">All Categories</option>
                        </select>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
                            <i class="fas fa-search"></i>
                        </div>
                    </div>
                </div>
                <div id="productsGrid" class="product-grid"></div>
            </div>
        </section>

        <!-- Product Detail Modal -->
        <div id="productModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div id="productDetail"></div>
            </div>
        </div>

        <!-- Login Section -->
        <section id="login" class="section">
            <div class="container">
                <div class="auth-form">
                    <h2>Login</h2>
                    <form id="loginForm" onsubmit="login(event)">
                        <div class="form-group">
                            <label for="loginEmail">Email</label>
                            <input type="email" id="loginEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Login</button>
                    </form>
                    <p>Don't have an account? <a href="#" onclick="showSection('register')">Sign up</a></p>
                </div>
            </div>
        </section>

        <!-- Register Section -->
        <section id="register" class="section">
            <div class="container">
                <div class="auth-form">
                    <h2>Create Account</h2>
                    <form id="registerForm" onsubmit="register(event)">
                        <div class="form-group">
                            <label for="regUsername">Username</label>
                            <input type="text" id="regUsername" required>
                        </div>
                        <div class="form-group">
                            <label for="regEmail">Email</label>
                            <input type="email" id="regEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="regPassword">Password</label>
                            <input type="password" id="regPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="regFullName">Full Name</label>
                            <input type="text" id="regFullName" required>
                        </div>
                        <div class="form-group">
                            <label for="regAddress">Address</label>
                            <textarea id="regAddress" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="regPhone">Phone</label>
                            <input type="tel" id="regPhone">
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                    </form>
                    <p>Already have an account? <a href="#" onclick="showSection('login')">Login</a></p>
                </div>
            </div>
        </section>

        <!-- Cart Section -->
        <section id="cart" class="section">
            <div class="container">
                <h2>Shopping Cart</h2>
                <div id="cartItems" class="cart-items"></div>
                <div id="cartSummary" class="cart-summary"></div>
            </div>
        </section>

        <!-- Orders Section -->
        <section id="orders" class="section">
            <div class="container">
                <h2>My Orders</h2>
                <div id="ordersList" class="orders-list"></div>
            </div>
        </section>

        <!-- Checkout Modal -->
        <div id="checkoutModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeCheckoutModal()">&times;</span>
                <div class="checkout-form">
                    <h3>Checkout</h3>
                    <form id="checkoutForm" onsubmit="placeOrder(event)">
                        <div class="form-group">
                            <label for="shippingAddress">Shipping Address</label>
                            <textarea id="shippingAddress" rows="4" required></textarea>
                        </div>
                        <div class="checkout-summary">
                            <div id="checkoutItems"></div>
                            <div class="total">
                                <strong>Total: $<span id="checkoutTotal">0.00</span></strong>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Place Order</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-credit">Created By: Shaik Rahamat Ali</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
